apiVersion: v1
kind: Service
metadata:
  name: log-output-svc
spec:
  type: ClusterIP
  selector:
    app: log-output            # This is the app as declared in the deployment.
  ports:
    - port: 2345               # port exposed for internal access
      protocol: TCP
      targetPort: 3000         # the target port where container(app) listening
