deploymentMode: SingleBinary

singleBinary:
  replicas: 1

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

loki:
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  useTestSchema: true

# To disable the extra Memcached pods:
chunksCache:
  enabled: false

resultsCache:
  enabled: false
