apiVersion: v1
kind: PersistentVolume
metadata:
  name: todo-backend-pv # Unique name
spec:
  storageClassName: mooc-pv
  claimRef:
    namespace: project
    name: todo-backend-pvc
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  local:
    path: /tmp/kube/backend # Dedicated path
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - k3d-k3s-default-agent-0
