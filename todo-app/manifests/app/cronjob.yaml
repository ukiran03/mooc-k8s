apiVersion: batch/v1
kind: CronJob
metadata:
  name: wiki-todo-gen
  namespace: project
spec:
  schedule: "0 * * * *"  # Runs at the start of every hour
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
            - name: wiki-job
              image: ushakiran369/wiki-job:2.9.v2
              env:
                - name: BACKEND_URL
                  value: "http://todo-backend-svc"
          restartPolicy: OnFailure # Changed from Never for resilience
