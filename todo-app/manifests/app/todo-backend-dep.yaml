apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: project
  name: todo-backend-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      securityContext:
        fsGroup: 1000 # Grants appuser write access to the mounted database volume
      volumes:
        - name: todo-backend-vol
          persistentVolumeClaim:
            claimName: todo-backend-pvc
      containers:
        - name: todo-backend
          image: ushakiran369/todo-backend:2.10
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: BACKEND_PORT
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: BACKEND_PORT
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: todo-app-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-todo-creds
                  key: username
            - name: DB_PASSWD
              valueFrom:
                secretKeyRef:
                  name: postgres-todo-creds
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-todo-creds
                  key: dbname

          volumeMounts:
            - name: todo-backend-vol
              mountPath: /app/data # Safely mounts here without burying the binary
