apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-app-ingress
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:          # routes incoming traffic forward to service
                name: todo-app-svc
                port:
                  number: 1234
