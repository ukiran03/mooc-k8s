apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: log-ping-ingress
  namespace: log-ping-gke
spec:
  rules:
    - http:
        paths:
          - path: /log
            pathType: ImplementationSpecific
            backend:
              service:
                name: log-ping-svc
                port:
                  number: 3000
          - path: /log/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: log-ping-svc
                port:
                  number: 3000
          - path: /pingpong
            pathType: ImplementationSpecific
            backend:
              service:
                name: log-ping-svc
                port:
                  number: 3001
          - path: /pingpong/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: log-ping-svc
                port:
                  number: 3001
