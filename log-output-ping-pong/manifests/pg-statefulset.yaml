# Service

apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: log-ping-gke
  labels:
    app: postgres
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  selector:
    app: postgres

---

# Secret

apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: log-ping-gke
type: Opaque
data:
  username: dWtpcmFu
  password: YWJjMTIz
  dbname: cGluZ3Bvbmdz

---

# StatefulSet

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-stset
  namespace: log-ping-gke
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-creds
                  key: dbname
          volumeMounts:
            - name: postgres-data-storage
              mountPath: /var/lib/postgresql
              subPath: postgres
  volumeClaimTemplates:
    - metadata:
        name: postgres-data-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        # storageClassName: "" -> use cluster default
        resources:
          requests:
            storage: 100Mi
